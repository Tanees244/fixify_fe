<div>
  <div [class]="ui.pageHeader">
    <div [class]="ui.pageTitle">Settings</div>
    <div [class]="ui.pageSub">Manage your websites, account, and preferences</div>
  </div>

  <div [class]="ui.grid2 + ' ' + ui.u">
    <div style="display: flex; flex-direction: column; gap: 18px">
      <div [class]="ui.card + ' ' + ui.cardPad + ' ' + ui.cardHover">
        <div [class]="ui.sectionHead" style="margin-bottom: 14px">
          <div [class]="ui.sectionTitle">Your Websites</div>
          <button type="button" [class]="ui.btn + ' ' + ui.btnPrimary + ' ' + ui.btnSm" (click)="addSite()">
            <app-icon name="plus" [size]="12" color="#fff" />
            Add Site
          </button>
        </div>
        @for (s of sites; track s.id) {
          <div style="display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--b2)">
            <app-site-avatar [fa]="s.fa" [size]="34" />
            <div style="flex: 1">
              <div style="font-weight: 600; font-size: 13.5px">{{ s.name }}</div>
              <div style="font-size: 11.5px; color: var(--t3)">{{ s.plan }} · Scanned {{ s.scan }}</div>
            </div>
            <app-badge [variant]="siteStatusBadge(s.st)">{{ siteStatusLabel(s.st) }}</app-badge>
            <button type="button" [class]="ui.btn + ' ' + ui.btnDanger + ' ' + ui.btnSm" (click)="removeSite(s.id)">Remove</button>
          </div>
        }
      </div>

      <app-account-settings-panel />
    </div>

    <div [class]="ui.card + ' ' + ui.cardPad + ' ' + ui.u + ' ' + ui.u1" style="height: fit-content">
      <div [class]="ui.sectionTitle" style="margin-bottom: 14px">Notification Preferences</div>
      @for (item of notificationItems; track item.key) {
        <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--b2)">
          <div style="flex: 1">
            <div style="font-size: 13.5px; font-weight: 500; color: var(--t1)">{{ item.label }}</div>
            <div style="font-size: 11.5px; color: var(--t3); margin-top: 2px">{{ item.desc }}</div>
          </div>
          <app-toggle [checked]="notifs()[item.key]" (toggled)="toggleNotif(item.key)" />
        </div>
      }
      <button type="button" [class]="ui.btn + ' ' + ui.btnPrimary + ' ' + ui.btnFull" style="margin-top: 14px; justify-content: center" (click)="savePreferences()">
        Save Preferences
      </button>
    </div>
  </div>
</div>
